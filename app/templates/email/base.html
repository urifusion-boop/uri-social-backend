<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { margin:0; padding:0; font-family:'Segoe UI',Roboto,sans-serif; background:#f5f5f5; }
  .wrap { max-width:560px; margin:0 auto; padding:20px; }
  .card { background:#fff; border-radius:12px; padding:40px 32px; text-align:center; }
  .logo { font-size:22px; font-weight:800; color:#CD1B78; margin-bottom:24px; letter-spacing:-.5px; }
  h1 { font-size:24px; font-weight:700; color:#111827; margin:0 0 12px; }
  p { font-size:15px; color:#4B5563; line-height:1.7; margin:0 0 16px; }
  .cta { display:inline-block; padding:14px 32px; background:linear-gradient(135deg,#CD1B78,#A01560); color:#fff; text-decoration:none; border-radius:10px; font-weight:700; font-size:15px; margin:20px 0; }
  .cta:hover { opacity:.9; }
  .badge { display:inline-block; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; }
  .badge-pink { background:rgba(205,27,120,.08); color:#CD1B78; }
  .badge-green { background:rgba(16,185,129,.08); color:#059669; }
  .footer { text-align:center; padding:24px 0 0; font-size:12px; color:#9CA3AF; }
  .footer a { color:#CD1B78; text-decoration:none; }
  .divider { height:1px; background:#E5E7EB; margin:24px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">URI Social</div>
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    <p>&copy; {{ year | default('2026') }} URI Social &middot; <a href="{{ app_url | default('https://app.urisocial.com') }}">Open Dashboard</a></p>
    <p style="margin-top:8px;">You're receiving this because you have a URI Social account.</p>
  </div>
</div>
</body>
</html>
