name: Build and Deploy Dockerized Python FastAPI App to Azure VM (PROD)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from the repository
      - uses: actions/checkout@v4

      # Set up Python environment
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Optional: Run tests
      # Uncomment and adjust the following lines to run tests if applicable
      # - name: Run tests
      #   run: pytest

      # Set up Docker Buildx for building multi-platform images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build and push Docker image
      - name: Build and push Docker image
        run: |
          docker build -t uriteam/urisvc:uriagentprod .
          docker push uriteam/urisvc:uriagentprod

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Checkout the code to access docker-compose.yml
      - uses: actions/checkout@v4

      # Copy source files and docker-compose to VM
      - name: Copy source files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP_DEV }}
          username: uridev
          key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
          source: "./app/,./docker-compose.prod.yml,./.env.example,./Dockerfile,./requirements.txt"
          target: "~/uri-social-backend/"
          strip_components: 0
          rm: true

      # SSH into the VM and deploy the Docker container
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_IP_DEV }}
          username: uridev
          key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
          port: 22
          timeout: 120s
          command_timeout: 15m
          script: |
            if [ ! -d ~/uri-social-backend ]; then
              mkdir -p ~/uri-social-backend;
            fi
            cd ~/uri-social-backend
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

            # Pull latest image
            docker pull uriteam/urisvc:uriagentprod

            # Deploy container (will restart uri-agent.api.prod)
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d

            # Cleanup redundant images
            docker image prune -f

            # Verify container is running
            docker ps | grep uri-agent.api.prod
