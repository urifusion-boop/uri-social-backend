name: Deploy to Production VM (Main Branch)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Install dependencies for validation
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push production Docker image
      - name: Build and push Docker image
        run: |
          docker build -t urisocial/backend:production -t urisocial/backend:latest .
          docker push urisocial/backend:production
          docker push urisocial/backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Copy necessary files to production VM
      - name: Copy files to Production VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_VM_IP }}
          username: ${{ secrets.PRODUCTION_VM_USERNAME }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          source: "./app/,./docker-compose.newprod.yml,./.env.production,./.env.example,./Dockerfile,./requirements.txt"
          target: "/home/${{ secrets.PRODUCTION_VM_USERNAME }}/uri-social-backend/"
          strip_components: 0
          rm: false

      # SSH into Production VM and deploy
      - name: Deploy on Production VM
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.PRODUCTION_VM_IP }}
          username: ${{ secrets.PRODUCTION_VM_USERNAME }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 20m
          script: |
            echo "🚀 Starting deployment to Production VM..."

            # Navigate to backend directory
            cd /home/${{ secrets.PRODUCTION_VM_USERNAME }}/uri-social-backend

            # Log in to Docker Hub
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

            # Pull latest production image
            echo "📦 Pulling latest Docker image..."
            docker pull urisocial/backend:production

            # Stop and remove existing container
            echo "🛑 Stopping existing container..."
            docker compose -f docker-compose.newprod.yml down

            # Start new container
            echo "▶️  Starting new container..."
            docker compose -f docker-compose.newprod.yml up -d

            # Wait for container to be healthy
            echo "⏳ Waiting for container to start..."
            sleep 10

            # Verify container is running
            echo "✅ Verifying deployment..."
            if docker ps | grep -q urisocial-backend-prod; then
              echo "✅ Container urisocial-backend-prod is running!"
              docker ps --filter name=urisocial-backend-prod --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            else
              echo "❌ Container failed to start!"
              docker logs urisocial-backend-prod --tail 50
              exit 1
            fi

            # Cleanup old images
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

            # Show container logs
            echo "📋 Recent logs:"
            docker logs urisocial-backend-prod --tail 20

            echo "✅ Deployment completed successfully!"

      # Notify deployment status (optional - add Slack/Discord webhook if needed)
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Production deployment completed successfully!"
          echo "🌐 API should be available at: https://api.urisocial.com"
          echo "📝 Container: urisocial-backend-prod"
          echo "🏷️  Image: urisocial/backend:production"
